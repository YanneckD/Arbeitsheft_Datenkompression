<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <style>
:root {
  --bg: #efe6c9;
  --paper: #ffffff;
  --box: #fff7ec;
  --ink: #1f2328;
  --muted: #4c5b66;
  --accent: #1c5d8c;
  --border: #e3d9c5;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Source Serif 4", "Merriweather", "Georgia", serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
}

h1, h2 {
  font-family: "Source Sans 3", "Gill Sans", "Trebuchet MS", sans-serif;
  margin: 0 0 0.6rem;
}

p {
  margin: 0 0 1rem;
}

a {
  color: var(--accent);
  text-decoration: none;
}

.container {
  width: min(1200px, 98vw);
  margin: 0 auto;
}

.hero {
  padding: 2rem 0 1.5rem;
  border-bottom: 1px solid var(--border);
  background: #fffdf8;
}

.hero-inner {
  display: flex;
  justify-content: space-between;
  gap: 1rem;
}

.hero-inner > div {
  width: 100%;
  text-align: center;
}

.nav-toggle {
  border: 1px solid var(--border);
  background: var(--paper);
  color: var(--accent);
  padding: 0.4rem 0.8rem;
  cursor: pointer;
}

.page {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: 1rem;
  width: min(1400px, 98vw);
  margin: 0 auto;
  padding: 1rem 0 2rem;
}

.side-nav {
  background: var(--box);
  border: 1px solid var(--border);
  padding: 0.8rem;
  position: sticky;
  top: 1rem;
  align-self: start;
  max-height: none;
  overflow: visible;
  transform: translateX(-110%);
}

.nav-open .side-nav {
  transform: translateX(0);
}

.side-nav nav {
  display: grid;
  gap: 0.5rem;
}

.content {
  background: var(--box);
  border: 1px solid var(--border);
  padding: 1.4rem 1.6rem 1.8rem;
}

.panel {
  padding: 1.2rem 0;
  border-bottom: 1px solid var(--border);
}

.panel:last-of-type {
  border-bottom: none;
}

.lead {
  color: var(--muted);
}

.article {
  margin-top: 1rem;
  border: 1px solid var(--border);
  background: #fffdf8;
  padding: 0.6rem 1rem 1rem;
}

.quote-box {
  margin-bottom: 1rem;
}

.article summary {
  cursor: pointer;
  color: var(--accent);
}

.gloss {
  cursor: help;
  border-bottom: 1px dotted rgba(0,0,0,0.12);
  color: var(--accent);
}

.gloss {
  position: relative;
  z-index: 1;
}
.gloss::after {
  content: attr(data-tooltip);
  position: absolute;
  right: 0;
  left: auto;
  transform: none;
  bottom: calc(100% + 8px);
  background: #122;
  color: #fff;
  padding: 6px 8px;
  white-space: normal;
  width: min(640px, 85vw);
  text-align: left;
  line-height: 1.35;
  font-size: 0.85rem;
  border-radius: 4px;
  display: none;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  overflow-wrap: break-word;
}
.gloss::before {
  content: "";
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: calc(100% + 4px);
  border: 6px solid transparent;
  border-top-color: #122;
  display: none;
}
.gloss:hover::after,
.gloss:hover::before {
  display: block;
}

.module-task {
  border-left: 6px solid var(--accent);
  background: rgba(28,93,140,0.08);
  padding: 0.7rem 1rem;
}

.task-label {
  font-weight: 700;
}

.intro-calc {
  display: grid;
  gap: 0.4rem;
  margin: 0.6rem 0;
}

.intro-task-grid {
  display: grid;
  gap: 1rem;
}

.rate-info {
  border: 1px solid var(--border);
  background: #fffdf8;
  padding: 0.6rem 0.7rem;
}

.rate-info p {
  margin: 0 0 0.45rem;
  font-size: 0.95rem;
}

.rate-info p:last-child {
  margin-bottom: 0;
}

.ui-mockup {
  border: 2px dashed var(--muted);
  background: var(--paper);
  padding: 1.5rem;
  margin: 1.5rem 0;
  font-family: monospace;
  text-align: center;
  color: var(--muted);
  border-radius: 4px;
}

.rate-info-title {
  font-weight: 700;
}

.intro-calc input,
.intro-calc button {
  max-width: 220px;
  padding: 0.4rem 0.55rem;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--ink);
  font: inherit;
}

.intro-calc button {
  cursor: pointer;
  background: #f7efe1;
}

.intro-result {
  margin: 0.5rem 0 0;
  color: var(--ink);
}

.sd-card-bar {
  position: relative;
  margin-top: 0.7rem;
  width: 100%;
  height: 1.4rem;
  border: 1px solid var(--border);
  background: #f7f2e6;
  overflow: hidden;
}

.sd-card-bar-fill {
  position: absolute;
  inset: 0 auto 0 0;
  width: 0;
  background: linear-gradient(90deg, #76b24f, #3f8f4b);
  transition: width 160ms ease;
}

.sd-card-bar-fill--overflow {
  background: linear-gradient(90deg, #d45b5b, #a92f2f);
}

.sd-card-bar-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  color: #122;
  mix-blend-mode: normal;
  pointer-events: none;
}

.assumption-task {
  margin-top: 1.2rem;
}

.help-row {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  margin: 0.35rem 0 0.75rem;
  flex-wrap: nowrap;
}

.help-toggle {
  display: inline-flex;
  flex: 0 0 auto;
  align-items: center;
  gap: 0.35rem;
  padding: 0.35rem 0.7rem;
  border: 1px solid var(--border);
  border-radius: 0;
  background: #f7efe1;
  color: var(--accent);
  font: inherit;
  cursor: pointer;
}

.help-box {
  display: block;
  flex: 1 1 auto;
  min-width: 0;
  padding: 0.65rem 0.75rem;
  border: 1px solid var(--border);
  background: #fffdf8;
  border-radius: 0;
}

.help-box[hidden] {
  display: none;
}

.help-box p {
  margin: 0;
  font-size: 0.95rem;
}

.assumption-textarea {
  width: 100%;
  min-height: 100px;
  padding: 0.6rem;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--ink);
  font-family: "Source Serif 4", "Merriweather", "Georgia", serif;
  font-size: 0.95rem;
  line-height: 1.5;
  border-radius: 3px;
}

.side-nav nav a.nav-link {
  display: block;
  padding: 0.45rem 0.6rem;
  border-radius: 6px;
  transition: background-color 120ms ease, color 120ms ease;
}
.side-nav nav a.nav-link:hover {
  background: rgba(0,0,0,0.06);
  color: var(--ink);
}

.footer {
  padding: 1.8rem 0 2.6rem;
  color: var(--muted);
  text-align: center;
}

@media (min-width: 960px) {
  .page {
    grid-template-columns: 180px minmax(0, 1fr);
  }

  .side-nav {
    transform: translateX(0);
  }

  .nav-toggle {
    display: none;
  }

  .intro-task-grid {
    grid-template-columns: minmax(0, 1fr) 410px;
    align-items: start;
  }
}

</style>
</head>

      p2: "Snowden hatte 2013 die ausufernde Überwachung durch den US-Geheimdienst NSA öffentlich gemacht. Die US-Behörden wollen ihm den Prozess machen. Deshalb lebt er in Russland im Exil.",
      p3: "Er habe die Daten seinerzeit auf sehr kleinen Micro- und Mini-SD-Karten gespeichert. \"Die passen überall hin\", meinte er. \"Zunächst einmal habe ich allen Kollegen Zauberwürfel geschenkt. Die waren also überall, die Wachen waren den Anblick gewöhnt und ich war schnell als \"der Zauberwürfel-Typ\" bekannt\", sagte Snowden. Die Karten hätten unter Aufkleber von Zauberwürfeln gepasst, ebenso in eine Socke oder seine Backe.",
      p4: "Die geringe Größe der SD-Karten hat aber auch einen Nachteil: Sie lassen sich nur äußerst langsam beschreiben. Das Kopieren großer Datenmengen dauert immer sehr lange – zumindest länger, als man will – , aber diese Zeit dehnt sich noch mehr, wenn man nicht auf eine schnelle Festplatte schreibt, sondern auf einen winzigen, in Plastik eingebetteten Siliziumchip. Außerdem kopierte ich nicht nur. Ich deduplizierte, komprimierte, verschlüsselte, und alle diese Prozesse lassen sich nicht gleichzeitig ausführen. Ich bediente mich aller Fähigkeiten, die ich in meiner Arbeit mit Datenspeicherung erworben hatte.",

const langData = window.LANG_DE || {};

function getLangValue(source, path) {
  if (!source || !path) {
    return undefined;
  }

  return path.split(".").reduce((acc, key) => {
    if (acc && typeof acc === "object" && key in acc) {
      return acc[key];
    }
    return undefined;
  }, source);
}

function applyLang(source) {
  if (!source || typeof source !== "object") {
    return;
  }

  if (source.meta && source.meta.lang) {
    document.documentElement.lang = source.meta.lang;
  }

  if (source.meta && source.meta.title) {
    document.title = source.meta.title;
  }

  document.querySelectorAll("[data-lang]").forEach((element) => {
    const value = getLangValue(source, element.dataset.lang);
    if (typeof value === "string") {
      element.innerHTML = value;
    }
  });

  document.querySelectorAll('.gloss').forEach((g) => {
    if (g instanceof Element) {
      const t = g.getAttribute('title');
      if (t) {
        g.setAttribute('data-tooltip', t);
        g.setAttribute('aria-label', t);
        g.removeAttribute('title');
      }
    }
  });

  document.querySelectorAll("[data-lang-attr]").forEach((element) => {
    const mappings = element.dataset.langAttr
      .split(";")
      .map((pair) => pair.trim())
      .filter(Boolean);

    mappings.forEach((pair) => {
      const [attr, key] = pair.split(":").map((part) => part.trim());
      if (!attr || !key) {
        return;
      }
      const value = getLangValue(source, key);
      if (typeof value === "string") {
        element.setAttribute(attr, value);
      }
    });
  });
}

const navToggle = document.getElementById("navToggle");
const sideNav = document.getElementById("sideNav");

function setupNavigation() {
  if (!navToggle || !sideNav) {
    return;
  }

  navToggle.addEventListener("click", () => {
    document.body.classList.toggle("nav-open");
  });

  sideNav.addEventListener("click", (event) => {
    if (event.target instanceof HTMLAnchorElement && window.innerWidth < 960) {
      document.body.classList.remove("nav-open");
    }
  });
}

function setupIntroCalculator(source) {
  const bitrateInput = document.getElementById("bitrateInput");
  const durationInput = document.getElementById("durationInput");
  const calcButton = document.getElementById("introCalcBtn");
  const result = document.getElementById("introCalcResult");
  const barFill = document.getElementById("sdCardBarFill");
  const barText = document.getElementById("sdCardBarText");

  if (!(bitrateInput instanceof HTMLInputElement) ||
      !(durationInput instanceof HTMLInputElement) ||
      !(calcButton instanceof HTMLButtonElement) ||
      !(result instanceof HTMLElement) ||
      !(barFill instanceof HTMLElement) ||
      !(barText instanceof HTMLElement)) {
    return;
  }

  const sizeTemplate = getLangValue(source, "intro.resultTemplate") || "";
  const invalidText = getLangValue(source, "intro.resultInvalid") || "";
  const cardSizeMb = 2 * 1024 * 8;

  const calculate = () => {
    const bitrate = Number.parseFloat(bitrateInput.value);
    const minutes = Number.parseFloat(durationInput.value);

    if (!Number.isFinite(bitrate) || !Number.isFinite(minutes) || bitrate <= 0 || minutes <= 0) {
      result.textContent = invalidText;
      barFill.style.width = "0%";
      barFill.classList.remove("sd-card-bar-fill--overflow");
      barText.textContent = "";
      return;
    }

    const sizeMb = bitrate * minutes * 60;
    const sizeMB = sizeMb / 8;
    const percent = (sizeMb / cardSizeMb) * 100;
    const videoCount = Math.floor(cardSizeMb / sizeMb);

    const line1 = sizeTemplate
      .replace("{sizeMb}", sizeMb.toFixed(1))
      .replace("{sizeMB}", sizeMB.toFixed(1))
      .replace("{percent}", percent.toFixed(1))
      .replace("{videoCount}", videoCount.toString());
    const clampedPercent = Math.min(percent, 100);

    result.textContent = line1;
    barFill.style.width = `${clampedPercent}%`;
    barFill.classList.toggle("sd-card-bar-fill--overflow", sizeMb > cardSizeMb);
    barText.textContent = `Füllstand: ${percent.toFixed(1)}%`;
  };

  calcButton.addEventListener("click", calculate);
}

function setupAssumptionHelp() {
  const toggle = document.getElementById("assumptionHelpToggle");
  const box = document.getElementById("assumptionHelpBox");

  if (!(toggle instanceof HTMLButtonElement) || !(box instanceof HTMLElement)) {
    return;
  }

  toggle.addEventListener("click", () => {
    const isHidden = box.hasAttribute("hidden");
    if (isHidden) {
      box.removeAttribute("hidden");
      toggle.setAttribute("aria-expanded", "true");
    } else {
      box.setAttribute("hidden", "");
      toggle.setAttribute("aria-expanded", "false");
    }
  });
}

applyLang(langData);
setupNavigation();
setupIntroCalculator(langData);
setupAssumptionHelp();

</script>
